    <!-- 强制禁用所有缓存层：HTML/响应头失败时仍有兜底
         这套 meta 是给那些不严格遵守 Cache-Control 的中间代理/老浏览器看的
         主流浏览器已靠 _headers 的 no-store 处理 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- 老 tab / bfcache / 已缓存的 SPA 强制刷新兜底
         这段代码永远跑在最新 HTML 里（因为 HTML 是 no-store，每次刷新都是新版）
         它做两件事：
           ① 检测 SPA 的 js hash 与服务端最新 hash，不一致就强制刷新
           ② 检测 pageshow 事件（mobile Chrome bfcache restore 标志），
              如果是从 bfcache 恢复的页面，强制硬刷一次 -->
    <script>
    (function() {
      // ① 版本对比：当前 SPA 跑的老 chunk vs 服务器最新 chunk
      function checkAndReload() {
        fetch('/index.html?_=' + Date.now(), { cache: 'no-store', credentials: 'same-origin' })
          .then(function(r) { return r.ok ? r.text() : '' })
          .then(function(html) {
            if (!html) return;
            var m = html.match(/\/js\/index-([a-f0-9]+)\.js/);
            var serverHash = m ? m[1] : null;
            var scripts = document.querySelectorAll('script[src*="/js/index-"]');
            var currentHash = null;
            for (var i = 0; i < scripts.length; i++) {
              var sm = scripts[i].src.match(/\/js\/index-([a-f0-9]+)\.js/);
              if (sm) { currentHash = sm[1]; break; }
            }
            if (serverHash && currentHash && serverHash !== currentHash) {
              // 服务端有新版本，硬刷
              window.location.replace(location.pathname + location.search + location.hash);
            }
          })
          .catch(function() { /* 网络/部署瞬时错误，静默 */ });
      }
      checkAndReload();

      // ② bfcache 强制拦截：pageshow 的 e.persisted=true 表示页面从 bfcache 恢复
      window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
          window.location.reload();
        }
      });
    })();
    </script>

    <!-- 兜底缓存清理 widget：内联在 HTML，零 JS 块依赖，永远可用
         设计目的：老 tab 的 SPA 跑的是旧 chunk，加载不到新功能，
         放这里就是为了让"任何状态的浏览器"都能点清理。样式也内联，避免被缓存的 CSS 影响。 -->
    <style>
      #__cache_keeper_widget__ {
        position: fixed;
        bottom: 80px;
        right: 16px;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        pointer-events: none;

      #__cache_keeper_toggle__ {

      #__cache_keeper_toggle__:active { transform: scale(.95); }
      #__cache_keeper_panel__ {

        display: none;
        width: 260px;

        border: 1px solid #e4e7ed;

        font-size: 13px;
        font-weight: 500;
        margin: 0 0 8px;
        font-family: inherit;
        transition: background-color .15s;
        text-align: center;
      }
      .__ck_btn__:last-child { margin-bottom: 0; }
      .__ck_btn__:disabled { cursor: not-allowed; opacity: .6; }
      .__ck_btn_primary__ { background: #f56c6c; color: #fff; }
      .__ck_btn_primary__:hover:not(:disabled) { background: #f84545; }
      .__ck_btn_secondary__ { background: #f4f4f5; color: #606266; }
      .__ck_btn_secondary__:hover:not(:disabled) { background: #e9e9eb; }
      @media (max-width: 640px) {
        #__cache_keeper_widget__ { bottom: 90px; right: 12px; }
        #__cache_keeper_panel__ { width: 240px; }
      }
    </style>

    <div id="app"></div>

    <!-- 兜底浮动按钮 DOM：内联在任何 SPA 加载之前 -->
    <div id="__cache_keeper_widget__" aria-label="页面管理">
      <div id="__cache_keeper_panel__" role="dialog" aria-label="缓存清理">
        <p class="__ck_title__">🛠️ 页面管理</p>
        <p class="__ck_desc__">页面卡在旧版本？点这里清理浏览器缓存，强制拉取最新版本。</p>
        <button id="__ck_clean_btn__" class="__ck_btn__ __ck_btn_primary__" type="button">
          🧹 清理缓存并刷新
        </button>
        <button id="__ck_full_btn__" class="__ck_btn__ __ck_btn_secondary__" type="button">
          ⚠️ 完全重置（含登录态）
        </button>
      </div>
      <button id="__cache_keeper_toggle__" type="button" title="页面管理" aria-label="页面管理">🛠️</button>
    </div>

    <!-- 兜底逻辑：纯内联脚本，零依赖、绝对能跑
         即使 main.ts / chunk / About.vue 全挂，这里仍能清缓存。 -->
    <script>
    (function() {
      function $(id) { return document.getElementById(id); }
      var widget = $('__cache_keeper_widget__');
      var toggle = $('__cache_keeper_toggle__');
      var panel = $('__cache_keeper_panel__');
      var cleanBtn = $('__ck_clean_btn__');
      var fullBtn = $('__ck_full_btn__');
      if (!widget || !toggle || !panel || !cleanBtn || !fullBtn) return;

      // 切换面板
      toggle.addEventListener('click', function() {
        panel.classList.toggle('open');
      });

      // URL 带 ?force-clear 自动展开面板（debug 用，也方便用户求助时让客服指引）
      if (/[?&]force-clear\b/.test(location.search)) {
        setTimeout(function() { panel.classList.add('open'); }, 100);
      }

      // SPA 加载失败兜底：8s 后 #app 仍为空，自动展开面板
      setTimeout(function() {
        var appEl = document.getElementById('app');
        if (appEl && appEl.children.length === 0) {
          panel.classList.add('open');
        }
      }, 8000);

      // 核心清理逻辑
      function cleanup() {
        return Promise.all([
          ('serviceWorker' in navigator) ?
            navigator.serviceWorker.getRegistrations()
              .then(function(regs) { return Promise.all(regs.map(function(r) { return r.unregister(); })); })
            : Promise.resolve(),
          ('caches' in window) ?
            caches.keys()
              .then(function(keys) { return Promise.all(keys.map(function(k) { return caches.delete(k); })); })
            : Promise.resolve()
        ]);
      }

      // 去掉 URL 里的 force-clear 参数（避免下次刷新又自动展开）
      function stripForceClear() {
        return location.search.replace(/[?&]force-clear(\b|&|$)/, '').replace(/\?$/, '');
      }

      cleanBtn.addEventListener('click', function() {
        if (cleanBtn.disabled) return;
        cleanBtn.disabled = true;
        cleanBtn.textContent = '清理中…';
        try { sessionStorage.clear(); } catch (e) {}
        cleanup().then(function() {
          cleanBtn.textContent = '✓ 已清理，即将刷新…';
          setTimeout(function() {
            // 用 replace 而非 reload，配合 ?_= 时间戳防 bfcache
            window.location.replace(location.pathname + stripForceClear() + location.hash);
          }, 400);
        }).catch(function() {
          cleanBtn.textContent = '✓ 即将刷新…';
          setTimeout(function() {
            window.location.replace(location.pathname + stripForceClear() + '?_=' + Date.now() + location.hash);
          }, 400);
        });
      });

      fullBtn.addEventListener('click', function() {
        if (fullBtn.disabled) return;
        if (!confirm('完全重置会清掉登录态、收藏夹、偏好设置等所有本地数据，确定继续？')) {
          return;
        }
        fullBtn.disabled = true;
        fullBtn.textContent = '清理中…';
        try { sessionStorage.clear(); } catch (e) {}
        try { localStorage.clear(); } catch (e) {}
        cleanup().then(function() {
          fullBtn.textContent = '✓ 已完全重置…';
          setTimeout(function() {
            window.location.replace('/?_=' + Date.now());
          }, 400);
        }).catch(function() {
          setTimeout(function() {
            window.location.replace('/?_=' + Date.now());
          }, 400);
        });
      });
    })();
    </script>
