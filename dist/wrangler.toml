# D1 数据库配置 仅用以本地调试，线上走pages绑定的db
[[d1_databases]]
binding = "DB"
database_name = "yifang-tool"
database_id = "afdabfae-6edd-4def-8e77-6a1171009b9c"

# d1数据库需要在pages的设置->绑定->D1数据库（变量名称为DB，数据库为创建的d1数据库）

# 本地调试指定线上数据库 wrangler pages dev --local --d1 yifang-tool:afdabfae-6edd-4def-8e77-6a1171009b9c
# 本地调试的话  也需要在本地建表：
#  notes表： wrangler d1 execute yifang-tool --command="CREATE TABLE notes (id TEXT PRIMARY KEY,uid TEXT NOT NULL,title TEXT NOT NULL,content TEXT NOT NULL,create_time DATETIME DEFAULT CURRENT_TIMESTAMP,update_time DATETIME DEFAULT CURRENT_TIMESTAMP);"
#  user表：wrangler d1 execute yifang-tool --command="CREATE TABLE user ("id" text PRIMARY KEY,"email" text,"avatar" text,"created_at" text,"last_login" text, third_party_uid TEXT, username TEXT, user_level INTEGER DEFAULT 0, third_party_type TEXT)"
#  简历表：wrangler d1 execute yifang-tool --command="CREATE TABLE resumes (     id TEXT PRIMARY KEY,     uid TEXT NOT NULL,     name TEXT NOT NULL,     template TEXT DEFAULT 'modern',     personal_info TEXT,     work_experience TEXT,     education TEXT,     skills TEXT,     projects TEXT,     certificates TEXT,     others TEXT,     create_time DATETIME DEFAULT CURRENT_TIMESTAMP,     update_time DATETIME DEFAULT CURRENT_TIMESTAMP )"
#  公司对比表：wrangler d1 execute yifang-tool --command="CREATE TABLE companies (   id TEXT PRIMARY KEY,   uid TEXT NOT NULL,   name TEXT NOT NULL,   position TEXT NOT NULL,   salary TEXT,   benefits TEXT,   work_days TEXT,   work_hours TEXT,   location TEXT,   welfare TEXT,   overtime TEXT,   leave_policy TEXT,   notes TEXT,   create_time DATETIME DEFAULT CURRENT_TIMESTAMP,   update_time DATETIME DEFAULT CURRENT_TIMESTAMP )"
#  qa表：wrangler d1 execute yifang-tool --command="CREATE TABLE qa_pages (   id TEXT PRIMARY KEY,   uid TEXT NOT NULL,   title TEXT NOT NULL,  header_content TEXT DEFAULT '',   footer_content TEXT DEFAULT '',   is_public BOOLEAN DEFAULT FALSE,   create_time DATETIME DEFAULT CURRENT_TIMESTAMP,   update_time DATETIME DEFAULT CURRENT_TIMESTAMP , qa_items TEXT NOT NULL)"
#  密码分组表：wrangler d1 execute yifang-tool --command="CREATE TABLE password_groups (   id TEXT PRIMARY KEY,   uid TEXT NOT NULL,   name TEXT NOT NULL,   color TEXT NOT NULL,   create_time DATETIME DEFAULT CURRENT_TIMESTAMP,   update_time DATETIME DEFAULT CURRENT_TIMESTAMP )"
#  密码条目表：wrangler d1 execute yifang-tool --command="CREATE TABLE password_entries (   id TEXT PRIMARY KEY,   uid TEXT NOT NULL,   title TEXT NOT NULL,   username TEXT,   password TEXT NOT NULL,   url TEXT,   group_id TEXT,   notes TEXT,   create_time DATETIME DEFAULT CURRENT_TIMESTAMP,   update_time DATETIME DEFAULT CURRENT_TIMESTAMP )"
#  体重成员表：wrangler d1 execute yifang-tool --command="CREATE TABLE weight_members (   id TEXT PRIMARY KEY,   uid TEXT NOT NULL,   name TEXT NOT NULL,   height REAL,   avatar_color TEXT,   avatar_emoji TEXT,   is_default INTEGER DEFAULT 0,   goal_weight REAL,   create_time DATETIME DEFAULT CURRENT_TIMESTAMP,   update_time DATETIME DEFAULT CURRENT_TIMESTAMP )"
#  体重记录表：wrangler d1 execute yifang-tool --command="CREATE TABLE weight_records (   id TEXT PRIMARY KEY,   uid TEXT NOT NULL,   member_id TEXT NOT NULL,   weight REAL NOT NULL,   height REAL,   note TEXT,   record_date TEXT NOT NULL,   record_time TEXT NOT NULL,   create_time DATETIME DEFAULT CURRENT_TIMESTAMP,   update_time DATETIME DEFAULT CURRENT_TIMESTAMP )"
#  mock 配方表：wrangler d1 execute yifang-tool --command="CREATE TABLE mock_schemas (   id TEXT PRIMARY KEY,   uid TEXT,   name TEXT NOT NULL,   description TEXT,   schema TEXT NOT NULL,   create_time DATETIME DEFAULT CURRENT_TIMESTAMP,   update_time DATETIME DEFAULT CURRENT_TIMESTAMP )"
#  四季景色表：wrangler d1 execute yifang-tool --command="CREATE TABLE user_season_scenery (id TEXT PRIMARY KEY, uid TEXT NOT NULL, data TEXT NOT NULL DEFAULT '[]', create_time TEXT NOT NULL, update_time TEXT NOT NULL)"
#  四季景色索引：wrangler d1 execute yifang-tool --command="CREATE UNIQUE INDEX idx_user_season_scenery_uid ON user_season_scenery(uid)"
#  OSS 配置表：wrangler d1 execute yifang-tool --command="CREATE TABLE oss_credentials (   id TEXT PRIMARY KEY,   uid TEXT NOT NULL,   name TEXT NOT NULL,   region TEXT NOT NULL,   bucket TEXT NOT NULL,   endpoint TEXT,   access_key_id_enc TEXT NOT NULL,   access_key_secret_enc TEXT NOT NULL,   role_arn TEXT,   policy TEXT,   duration_seconds INTEGER DEFAULT 3600,   is_default INTEGER DEFAULT 0,   create_time DATETIME DEFAULT CURRENT_TIMESTAMP,   update_time DATETIME DEFAULT CURRENT_TIMESTAMP )"
#  OSS 配置索引：wrangler d1 execute yifang-tool --command="CREATE INDEX idx_oss_credentials_uid ON oss_credentials(uid)"

# 使用该命令查看本地有哪些表：wrangler d1 execute yifang-tool --command="SELECT name FROM sqlite_master WHERE type='table';"

